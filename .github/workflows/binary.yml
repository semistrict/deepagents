name: "📦 Binary Build"

on:
  push:
    branches: [main]
    paths:
      - 'libs/cli/**'
      - 'libs/deepagents/**'
      - 'libs/codex-chatgpt-auth/**'
      - '.github/workflows/binary.yml'
  pull_request:
    paths:
      - 'libs/cli/**'
      - 'libs/deepagents/**'
      - 'libs/codex-chatgpt-auth/**'
      - '.github/workflows/binary.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NUITKA_COMMON_ARGS: >-
    --mode=onefile
    --output-filename=deepagents
    --include-package=deepagents_cli
    --include-package=deepagents
    --include-package=langchain_openai
    --include-package=langchain_anthropic
    --include-package=langchain_google_genai
    --include-package=langchain_openrouter
    --include-package=langchain_codex_chatgpt_auth
    --include-package=langchain
    --include-package=langgraph
    --include-package=textual
    --include-data-dir=deepagents_cli=deepagents_cli
    --include-package-data=textual
    --include-package-data=certifi
    --follow-imports
    --assume-yes-for-downloads

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "🍎 macOS arm64"
            runner: macos-latest
            artifact: deepagents-macos-arm64
            nuitka-extra: "--macos-target-arch=arm64"
            cc: "ccache clang"
            ccache-key: nuitka-macos-arm64

          - name: "🐧 Linux x86_64"
            runner: ubuntu-latest
            artifact: deepagents-linux-x86_64
            nuitka-extra: ""
            cc: "ccache gcc"
            ccache-key: nuitka-linux-x86_64

          - name: "🐧 Linux arm64"
            runner: ubuntu-24.04-arm
            artifact: deepagents-linux-arm64
            nuitka-extra: ""
            cc: "ccache gcc"
            ccache-key: nuitka-linux-arm64

    steps:
      - name: "📋 Checkout"
        uses: actions/checkout@v6

      - name: "🐍 Set up Python 3.14 + UV"
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: "💾 ccache"
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.ccache-key }}

      - name: "📦 Install dependencies"
        working-directory: libs/cli
        run: |
          uv sync --extra codex-chatgpt-auth --extra openrouter

      - name: "🔨 Compile binary"
        working-directory: libs/cli
        env:
          CC: ${{ matrix.cc }}
        run: |
          uv run nuitka \
            ${{ env.NUITKA_COMMON_ARGS }} \
            ${{ matrix.nuitka-extra }} \
            deepagents_cli/__main__.py

      - name: "✅ Verify binary"
        working-directory: libs/cli
        run: |
          file deepagents
          ls -lh deepagents
          ./deepagents -v

      - name: "📤 Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: libs/cli/deepagents
          retention-days: 30
