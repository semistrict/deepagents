# Simplified CI for fork — ruff, ty, tests on Python 3.14 only

name: "🔧 CI"

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  UV_NO_SYNC: "true"

jobs:
  changes:
    name: "🔍 Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      deepagents: ${{ steps.filter.outputs.deepagents }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "🔍 Check for changes"
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            deepagents:
              - 'libs/deepagents/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/actions/**'
            cli:
              - 'libs/cli/**'
              - 'libs/codex-chatgpt-auth/**'
              - 'libs/deepagents/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/_lint.yml'
              - '.github/workflows/_test.yml'
              - '.github/workflows/_benchmark.yml'
              - '.github/actions/**'

  lint-deepagents:
    name: "🧹 Lint deepagents"
    needs: changes
    if: needs.changes.outputs.deepagents == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/deepagents"
      python-version: "3.14"

  lint-cli:
    name: "🧹 Lint cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_lint.yml
    with:
      working-directory: "libs/cli"
      python-version: "3.14"

  test-deepagents:
    name: "🧪 Test deepagents"
    needs: changes
    if: needs.changes.outputs.deepagents == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/deepagents"
      python-version: "3.14"

  test-cli:
    name: "🧪 Test cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_test.yml
    with:
      working-directory: "libs/cli"
      python-version: "3.14"

  benchmark-deepagents:
    name: "⏱️ Benchmark deepagents"
    needs: changes
    if: needs.changes.outputs.deepagents == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_benchmark.yml
    with:
      working-directory: "libs/deepagents"
    secrets: inherit

  benchmark-cli:
    name: "⏱️ Benchmark cli"
    needs: changes
    if: needs.changes.outputs.cli == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/_benchmark.yml
    with:
      working-directory: "libs/cli"
    secrets: inherit

  ci_success:
    name: "✅ CI Success"
    needs:
      - changes
      - lint-deepagents
      - lint-cli
      - test-deepagents
      - test-cli
      - benchmark-deepagents
      - benchmark-cli
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "🎉 All Checks Passed"
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "Some jobs failed or were cancelled"
            exit 1
          fi
          echo "All required checks passed (skipped jobs are OK)"
          exit 0
